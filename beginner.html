<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="description" content="Absolute beginner guide to Termux - Learn terminal basics from scratch">
  <title>Beginner Guide · Termux</title>
  <link rel="icon" href="/assets/termux.svg" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/core.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <!-- Desktop Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <img src="/assets/termux.svg" alt="Termux" class="sidebar-logo" onclick="window.location.href='/'">
      <h3>Beginner Guide</h3>
      <a href="/" class="mobile-back-link" style="display: block;">← Back to Main</a>
    </div>
    <div class="sidebar-items" id="sidebarItems"></div>
  </aside>

  <!-- Mobile Hamburger -->
  <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="menu-overlay" id="menuOverlay"></div>
  
  <div class="menu-panel" id="menuPanel">
    <div class="menu-header">
      <img src="/assets/termux.svg" alt="Termux" class="menu-logo">
      <h3>Beginner Guide</h3>
      <a href="/" class="mobile-back-link">← Back to Main</a>
    </div>
    <div class="menu-items" id="mobileMenuItems"></div>
  </div>

  <div class="app">
    <header class="header">
      <div class="logo-wrapper" onclick="window.location.href='/'">
        <img src="/assets/termux.svg" alt="Termux" class="logo-icon">
        <h1>Beginner<span class="logo-highlight">Guide</span></h1>
      </div>
      <p>Never used a terminal before? Start here. No prior knowledge needed.</p>
    </header>

    <div class="back-link-wrapper">
      <a href="/" class="back-link">
        <i class="fas fa-arrow-left"></i>
        <span>Back to Main Guide</span>
      </a>
    </div>

    <div class="search-container">
      <div class="search-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" class="search-input" placeholder="Search beginner topics...">
        <button class="search-clear" id="searchClear" style="display: none;">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>

    <main class="main">
      <div class="container">
        <div id="contentContainer"></div>
      </div>
    </main>

    <footer class="footer">
      <p>Termux is available on <a href="https://f-droid.org/en/packages/com.termux/" target="_blank">F-Droid</a> and <a href="https://github.com/termux/termux-app" target="_blank">GitHub</a></p>
      <p class="footer-note">2026 Incognito · Open Source Tutorial</p>
    </footer>
  </div>

  <div id="copyToast" class="toast">Copied to clipboard!</div>

  <script src="/js/utils.js"></script>
  <script src="/js/navigation.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
